# Overrides for the DSS demo webapp, loaded from the classpath on top of the WAR's own dss.properties
# (PropertiesConfig: classpath:dss.properties, then classpath:dss-custom.properties with
# ignoreResourceNotFound=true — later wins). Tomcat's ${catalina.home}/lib is on the common classpath,
# which is why this file and the trust store live there.
#
# Trust the certificate authorities in our own trust store IN ADDITION to the EU trusted lists. DSS wires
# this keystore into the CertificateVerifier as a second trusted source alongside the LOTL/TL source
# (DSSBeanConfig#trustedCertificateSource → certificateVerifier.setTrustedCertSources(...)), so EU
# qualification is unaffected: a signature under our root validates as trusted, but never as qualified.
#
# The filename is resolved as a CLASSPATH resource, not a filesystem path — keep it a bare name.
trusted.source.keystore.type = PKCS12
trusted.source.keystore.filename = mipdfsign-truststore.p12
trusted.source.keystore.password = dss-password
